<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}UPI Fraud Detection{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% if session.get('user_id') %}
  <nav class="topbar">
    <div class="brand">🛡️ UPI<span>Guard</span></div>
    <div class="links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('send') }}">Send Money</a>
      <a href="{{ url_for('emi') }}">EMIs</a>
      <a href="{{ url_for('special') }}">Special</a>
      <a href="{{ url_for('profile') }}">Profile</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main class="container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, m in msgs %}
        <div class="flash flash-{{ cat }}">{{ m }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
